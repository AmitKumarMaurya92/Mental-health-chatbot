<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="chat-container">
        <header class="chat-header">
            <div class="avatar">✨</div>
            <div class="header-info">
                <h1>AI Companion</h1>
                <p>Always here to listen and support you.</p>
            </div>
        </header>

        <main class="chat-history">
            {% if history|length == 0 %}
                <div class="empty-state">
                    <p>No messages yet. Say hello! 👋</p>
                </div>
            {% endif %}
            
            {% for msg in history %}
                <div class="message-wrapper {{ 'user-wrapper' if msg.role == 'user' else 'bot-wrapper' }}">
                    <div class="message {{ 'user-message' if msg.role == 'user' else 'bot-message' }}">
                        {{ msg.content }}
                    </div>
                </div>
            {% endfor %}
            <!-- Anchor to scroll to bottom naturally -->
            <div id="bottom"></div>
        </main>

        <footer class="chat-input-area">
            <form action="/chat_ui" method="POST" class="input-form">
                <input type="text" name="message" placeholder="Type how you're feeling..." autocomplete="off" required autofocus>
                <button type="submit">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </footer>
    </div>

    <!-- Simple trick to auto-scroll to bottom on page load without JS script tag logic -->
    <style>
        html { scroll-behavior: smooth; }
    </style>
    <script>
        // Only one line of JS to ensure we start at the bottom of the chat history
        window.scrollTo(0, document.body.scrollHeight);
    </script>
</body>
</html>
