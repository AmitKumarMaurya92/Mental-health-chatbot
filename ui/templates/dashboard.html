<!-- dashboard.html -->
<div id="insights-view" class="view-section" style="padding: 40px; overflow-y: auto;">
    <header style="margin-bottom: 30px;">
        <h1>Your Insights</h1>
        <p style="color: var(--text-muted);">Understanding your emotional journey.</p>
    </header>

    <div class="insight-card" style="background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--card-border); margin-bottom: 30px;">
        <h3>Mood Trends (Last 7 Days)</h3>
        <div style="height: 300px; margin-top: 20px;">
            <canvas id="moodChart"></canvas>
        </div>
    </div>

    <div class="insight-card" style="background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--card-border); margin-bottom: 30px;">
        <h3>Mood Distribution</h3>
        <div style="height: 300px; margin-top: 20px; display: flex; justify-content: center;">
            <canvas id="moodPieChart"></canvas>
        </div>
    </div>

    <div id="weekly-summary" class="insight-card" style="background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--card-border);">
        <h3>AI Weekly Summary</h3>
        <p id="summary-text" style="color: var(--text-muted); margin-top: 12px; line-height: 1.6;">Start chatting to see your emotional patterns over time.</p>
    </div>
</div>
