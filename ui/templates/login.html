<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .theme-toggle-floating {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 2000;
            font-size: 1.25rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px -6px rgba(0,0,0,0.3);
        }
        .theme-toggle-floating:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 12px 24px -6px rgba(0,0,0,0.4);
        }
        [data-theme="light"] .theme-toggle-floating {
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 20px -6px rgba(0,0,0,0.1);
        }
        [data-theme="light"] .theme-toggle-floating:hover {
            background: #fff;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-gradient);
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }
        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--card-border);
        }
        .login-card h1 {
            font-family: 'Outfit', sans-serif;
            margin-bottom: 10px;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
        }
        .login-card p {
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .login-input {
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }
        .login-input::placeholder {
            color: var(--text-muted);
        }
        .login-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-glow);
            background: rgba(255, 255, 255, 0.08);
        }
        .login-btn {
            background: var(--user-msg-bg);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--primary-glow);
            filter: brightness(1.1);
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            margin: 20px 0;
            font-size: 0.9rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--card-border);
        }
        .divider:not(:empty)::before {
            margin-right: .5em;
        }
        .divider:not(:empty)::after {
            margin-left: .5em;
        }
    </style>
</head>
<body data-theme="dark">
    <div class="theme-toggle-floating" id="theme-toggle" title="Toggle Theme">
        <span id="theme-icon">🌙</span>
    </div>

    <div class="login-card">
        <div class="logo-circle" style="margin: 0 auto 20px auto; width: 60px; height: 60px; font-size: 1.5rem;">✨</div>
        <h1>Welcome Back</h1>
        <p>Enter your name and password to continue your journey. New users will be automatically registered.</p>
        
        {% if error %}
        <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 0.9rem;">
            {{ error }}
        </div>
        {% endif %}

        <form class="login-form" action="/login" method="POST">
            <input type="text" name="username" class="login-input" placeholder="Your Name" required autofocus>
            <input type="password" name="password" class="login-input" placeholder="Your Password" required>
            <button type="submit" class="login-btn">Start Chatting</button>
        </form>

        <script>
            // Theme Toggle Logic
            const themeToggle = document.getElementById('theme-toggle');
            const themeIcon = document.getElementById('theme-icon');
            
            if (themeToggle) {
                themeToggle.onclick = () => {
                    const isDark = document.body.getAttribute('data-theme') !== 'light';
                    document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
                    themeIcon.textContent = isDark ? '☀️' : '🌙';
                };
            }
        </script>
    </div>
</body>
</html>
