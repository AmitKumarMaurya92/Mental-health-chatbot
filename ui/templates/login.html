<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-gradient);
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }
        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--card-border);
        }
        .login-card h1 {
            font-family: 'Outfit', sans-serif;
            margin-bottom: 10px;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
        }
        .login-card p {
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .login-input {
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }
        .login-input::placeholder {
            color: var(--text-muted);
        }
        .login-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-glow);
            background: rgba(255, 255, 255, 0.08);
        }
        .login-btn {
            background: var(--user-msg-bg);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--primary-glow);
            filter: brightness(1.1);
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            margin: 20px 0;
            font-size: 0.9rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--card-border);
        }
        .divider:not(:empty)::before {
            margin-right: .5em;
        }
        .divider:not(:empty)::after {
            margin-left: .5em;
        }
    </style>
</head>
<body data-theme="dark">
    <div class="login-card">
        <div class="logo-circle" style="margin: 0 auto 20px auto; width: 60px; height: 60px; font-size: 1.5rem;">✨</div>
        <h1>Welcome Back</h1>
        <p>Enter your name to continue your journey.</p>
        
        {% if users %}
        <div class="user-list-card" id="user-list-card">
            <div class="user-list-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--card-border); padding: 32px 24px; background: rgba(255, 255, 255, 0.02);">
                <h3 style="margin: 0; color: #ffffff; font-size: 1.5rem; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase;">ALL USERS</h3>
                <div style="display: flex; gap: 24px; align-items: center;">
                    <div class="add-user-toggle" title="Create New User" onclick="window.location.href='/logout'" style="color: #ffffff; cursor: pointer; transition: all 0.2s; opacity: 0.7;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </div>
                    <div class="delete-mode-toggle" id="delete-toggle" title="Toggle Delete Mode" style="color: #fb7185; opacity: 0.9; transition: all 0.2s; cursor: pointer;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.9'">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    </div>
                </div>
            </div>
            <div class="user-rows">
                {% for user in users %}
                <div class="user-item-row" onclick="handleUserClick('{{ user }}')" style="padding: 24px;">
                    <span>{{ user }}</span>
                    <span class="delete-indicator">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </span>
                </div>
                {% endfor %}
            </div>
        </div>

        <form id="login-redirect-form" action="/login" method="POST" style="display: none;">
            <input type="hidden" name="username" id="login-username">
        </form>

        <form id="delete-redirect-form" action="/delete_user" method="POST" style="display: none;">
            <input type="hidden" name="username" id="delete-username">
        </form>

        <script>
            let deleteMode = false;
            const deleteToggle = document.getElementById('delete-toggle');
            const userListCard = document.getElementById('user-list-card');

            deleteToggle.onclick = (e) => {
                e.stopPropagation();
                deleteMode = !deleteMode;
                deleteToggle.classList.toggle('active', deleteMode);
                userListCard.classList.toggle('delete-mode', deleteMode);
            };

            function handleUserClick(username) {
                if (deleteMode) {
                    if (confirm(`Delete user "${username}" and all their data?`)) {
                        document.getElementById('delete-username').value = username;
                        document.getElementById('delete-redirect-form').submit();
                    }
                } else {
                    document.getElementById('login-username').value = username;
                    document.getElementById('login-redirect-form').submit();
                }
            }
        </script>

        <div class="divider">or create new</div>
        {% endif %}

        <form class="login-form" action="/login" method="POST">
            <input type="text" name="username" class="login-input" placeholder="Your Name" required {% if not users %}autofocus{% endif %}>
            <button type="submit" class="login-btn">Start Chatting</button>
        </form>
    </div>
</body>
</html>
